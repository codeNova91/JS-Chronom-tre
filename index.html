<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: black;
    }

    .container {
        text-align: center;
        background: gray;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    #display {
        font-size: 5rem;
        font-family: monospace;
        margin-top: 20px;
        color: #2d3436;
    }

    button {
        padding: 12px 25px;
        font-size: 1rem;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
        transition: 0.2s;
    }

    /* boutton demarrer */

    #startBtn {
        background-color: #2ecc71;
        color: white;
    }

    #startBtn:hover {
        background-color: #27ae60;
    }

    /* bouton Arrêt */
    #stopBtn {
        background-color: #e74c3c;
        color: white;
    }

    #stopBtn:hover {
        background-color: #c0392b;
    }
</style>

<body>
    <div class="container">
        <button id="startBtn" onclick="start()">Démarrer</button>
        <button id="stopBtn" onclick="stop()">Arrêt</button>

        <div id="display">00:00:00</div>
    </div>
    <script src="crono.js"></script>


</body>

</html>
